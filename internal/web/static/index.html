<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Webhix</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0f0f0f;
      --panel:     #1a1a1a;
      --panel2:    #1e1e1e;
      --border:    #2a2a2a;
      --text:      #e0e0e0;
      --muted:     #6b7280;
      --accent:    #7c6af7;
      --accent-dim:#4c3fb5;
      --post:      #22c55e;
      --get:       #3b82f6;
      --delete:    #ef4444;
      --put:       #f59e0b;
      --patch:     #f97316;
      --font:      'JetBrains Mono', 'Fira Code', 'Cascadia Code', ui-monospace, monospace;
    }

    html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); font-size: 13px; }

    /* ── HEADER ─────────────────────────────────────────── */
    header {
      display: flex; align-items: center; gap: 16px;
      padding: 0 20px; height: 52px;
      background: var(--panel); border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .logo { font-size: 18px; font-weight: 700; color: var(--accent); letter-spacing: -0.5px; }
    .logo span { color: var(--text); }
    .endpoint-pill {
      display: flex; align-items: center; gap: 8px;
      background: var(--panel2); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 12px;
      flex: 1; max-width: 560px;
    }
    .endpoint-pill .label { color: var(--muted); font-size: 11px; white-space: nowrap; }
    .endpoint-pill .url { color: var(--accent); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .copy-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      padding: 2px 4px; border-radius: 4px; font-size: 12px;
      transition: color .15s;
    }
    .copy-btn:hover { color: var(--text); }
    .status-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--muted); flex-shrink: 0;
      transition: background .3s;
    }
    .status-dot.connected { background: var(--post); box-shadow: 0 0 6px var(--post); }
    .new-btn {
      margin-left: auto;
      padding: 6px 14px; border-radius: 6px;
      background: var(--accent); border: none;
      color: #fff; cursor: pointer; font-family: var(--font); font-size: 12px; font-weight: 600;
      transition: background .15s;
    }
    .new-btn:hover { background: var(--accent-dim); }

    /* ── TOKEN ENTRY OVERLAY ────────────────────────────── */
    #overlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 20px; z-index: 100;
    }
    #overlay h2 { font-size: 22px; color: var(--accent); }
    #overlay p  { color: var(--muted); font-size: 12px; text-align: center; max-width: 340px; line-height: 1.6; }
    .token-form { display: flex; gap: 8px; }
    .token-input {
      background: var(--panel2); border: 1px solid var(--border);
      color: var(--text); font-family: var(--font); font-size: 13px;
      padding: 8px 14px; border-radius: 6px; width: 280px; outline: none;
      transition: border-color .15s;
    }
    .token-input:focus { border-color: var(--accent); }
    .go-btn {
      padding: 8px 18px; border-radius: 6px;
      background: var(--accent); border: none;
      color: #fff; cursor: pointer; font-family: var(--font); font-size: 13px; font-weight: 600;
    }
    .divider { color: var(--muted); font-size: 11px; }
    .create-link {
      color: var(--accent); cursor: pointer; text-decoration: underline;
      font-size: 12px; background: none; border: none; font-family: var(--font);
    }

    /* ── MAIN LAYOUT ────────────────────────────────────── */
    #app { display: flex; flex-direction: column; height: 100%; }
    .main { display: flex; flex: 1; overflow: hidden; }

    /* ── LEFT PANEL ─────────────────────────────────────── */
    .list-panel {
      width: 30%; min-width: 220px; max-width: 380px;
      display: flex; flex-direction: column;
      border-right: 1px solid var(--border); background: var(--panel);
    }
    .panel-header {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-shrink: 0;
    }
    .panel-header h3 { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: var(--muted); }
    .count-badge {
      background: var(--border); color: var(--muted); font-size: 11px;
      border-radius: 10px; padding: 1px 7px;
    }
    .request-list { flex: 1; overflow-y: auto; }
    .request-list::-webkit-scrollbar { width: 4px; }
    .request-list::-webkit-scrollbar-track { background: transparent; }
    .request-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .req-item {
      padding: 10px 16px; border-bottom: 1px solid var(--border);
      cursor: pointer; display: flex; align-items: flex-start; gap: 10px;
      transition: background .1s;
    }
    .req-item:hover { background: var(--panel2); }
    .req-item.active { background: rgba(124,106,247,.12); border-left: 2px solid var(--accent); }
    .method-badge {
      display: inline-block; font-size: 10px; font-weight: 700;
      padding: 2px 6px; border-radius: 4px; flex-shrink: 0;
      text-transform: uppercase; letter-spacing: .04em;
    }
    .method-GET    { background: rgba(59,130,246,.15);  color: var(--get); }
    .method-POST   { background: rgba(34,197,94,.15);   color: var(--post); }
    .method-PUT    { background: rgba(245,158,11,.15);  color: var(--put); }
    .method-DELETE { background: rgba(239,68,68,.15);   color: var(--delete); }
    .method-PATCH  { background: rgba(249,115,22,.15);  color: var(--patch); }
    .method-OTHER  { background: rgba(107,114,128,.15); color: var(--muted); }

    .req-meta { flex: 1; min-width: 0; }
    .req-path { color: var(--text); font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .req-time { color: var(--muted); font-size: 10px; margin-top: 3px; }
    .new-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 5px; }

    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; color: var(--muted); text-align: center; padding: 24px;
    }
    .empty-icon { font-size: 32px; opacity: .5; }

    /* ── RIGHT PANEL ─────────────────────────────────────── */
    .detail-panel {
      flex: 1; display: flex; flex-direction: column;
      overflow: hidden; background: var(--panel2);
    }
    .detail-placeholder {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 12px; color: var(--muted);
    }
    .detail-placeholder .big-icon { font-size: 48px; opacity: .3; }

    .detail-top {
      padding: 16px 20px 0; border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .detail-title {
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .detail-title .method-badge { font-size: 12px; padding: 4px 10px; }
    .detail-path { font-size: 14px; color: var(--text); word-break: break-all; }
    .detail-ts { font-size: 11px; color: var(--muted); margin-top: 4px; }

    /* tabs */
    .tabs { display: flex; gap: 0; }
    .tab {
      padding: 8px 18px; cursor: pointer; border: none; background: none;
      font-family: var(--font); font-size: 12px; color: var(--muted);
      border-bottom: 2px solid transparent;
      transition: color .15s, border-color .15s;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

    .tab-content { flex: 1; overflow-y: auto; padding: 20px; }
    .tab-content::-webkit-scrollbar { width: 4px; }
    .tab-content::-webkit-scrollbar-track { background: transparent; }
    .tab-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* kv table */
    .kv-table { width: 100%; border-collapse: collapse; }
    .kv-table th, .kv-table td {
      text-align: left; padding: 7px 12px; border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    .kv-table th { color: var(--muted); font-size: 11px; text-transform: uppercase; letter-spacing: .06em; font-weight: 500; }
    .kv-table td:first-child { color: var(--accent); white-space: nowrap; padding-right: 20px; font-size: 12px; }
    .kv-table td:last-child { color: var(--text); word-break: break-all; font-size: 12px; }

    /* body pre */
    .body-pre {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 6px; padding: 16px; overflow-x: auto;
      font-size: 12px; line-height: 1.6; color: var(--text);
      white-space: pre; min-height: 80px;
    }
    .body-empty { color: var(--muted); font-style: italic; }

    /* info cards */
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .info-card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 6px; padding: 14px 16px;
    }
    .info-card .card-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px; }
    .info-card .card-value { font-size: 13px; color: var(--text); word-break: break-all; }

    /* toast */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: var(--panel2); border: 1px solid var(--border);
      color: var(--text); padding: 10px 18px; border-radius: 6px;
      font-size: 12px; opacity: 0; pointer-events: none;
      transition: opacity .2s;
    }
    #toast.show { opacity: 1; }

    /* JSON syntax highlighting */
    .json-key    { color: #7c6af7; }
    .json-str    { color: #34d399; }
    .json-num    { color: #f59e0b; }
    .json-bool   { color: #60a5fa; }
    .json-null   { color: #6b7280; }
  </style>
</head>
<body>

<div id="app">
  <header>
    <div class="logo">Web<span>hix</span></div>
    <div class="endpoint-pill" id="pillArea" style="display:none">
      <span class="label">Endpoint</span>
      <span class="url" id="pillURL"></span>
      <button class="copy-btn" title="Copy URL" onclick="copyURL()">&#128203;</button>
    </div>
    <div class="status-dot" id="statusDot" title="SSE connection"></div>
    <button class="new-btn" onclick="showOverlay()">+ New Endpoint</button>
  </header>

  <!-- Token Entry Overlay -->
  <div id="overlay">
    <h2>Welcome to Webhix</h2>
    <p>Enter an existing endpoint token, or create a new one to start capturing webhooks.</p>
    <div class="token-form">
      <input class="token-input" id="tokenInput" type="text" placeholder="your-endpoint-token" autocomplete="off" />
      <button class="go-btn" onclick="loadToken()">Go</button>
    </div>
    <span class="divider">— or —</span>
    <button class="create-link" onclick="createNewEndpoint()">Create a new endpoint automatically</button>
  </div>

  <div class="main" id="mainArea" style="display:none">
    <!-- Left panel -->
    <div class="list-panel">
      <div class="panel-header">
        <h3>Requests</h3>
        <span class="count-badge" id="countBadge">0</span>
      </div>
      <div class="request-list" id="requestList">
        <div class="empty-state" id="emptyState">
          <div class="empty-icon">&#128246;</div>
          <div>Waiting for requests&hellip;</div>
          <div style="font-size:11px">Send a webhook to your endpoint URL</div>
        </div>
      </div>
    </div>

    <!-- Right panel -->
    <div class="detail-panel" id="detailPanel">
      <div class="detail-placeholder" id="detailPlaceholder">
        <div class="big-icon">&#128270;</div>
        <div>Select a request to inspect it</div>
      </div>
      <div id="detailContent" style="display:none; display:flex; flex-direction:column; height:100%">
        <div class="detail-top">
          <div class="detail-title">
            <span class="method-badge" id="dtMethod"></span>
            <span class="detail-path" id="dtPath"></span>
          </div>
          <div class="detail-ts" id="dtTs"></div>
          <div class="tabs">
            <button class="tab active" onclick="switchTab('headers')">Headers</button>
            <button class="tab" onclick="switchTab('body')">Body</button>
            <button class="tab" onclick="switchTab('query')">Query</button>
            <button class="tab" onclick="switchTab('info')">Info</button>
          </div>
        </div>
        <div class="tab-content" id="tabContent"></div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  // ── State ────────────────────────────────────────────────
  let currentToken = null;
  let requests     = [];          // [{...WebhookRequestContract}]
  let selectedIdx  = null;
  let activeTab    = 'headers';
  let evtSource    = null;
  let seenIds      = new Set();

  // ── Init ─────────────────────────────────────────────────
  (function init() {
    const params = new URLSearchParams(location.search);
    const t = params.get('token');
    if (t) {
      document.getElementById('tokenInput').value = t;
      activateToken(t);
    }
    document.getElementById('tokenInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') loadToken();
    });
  })();

  // ── Token flow ───────────────────────────────────────────
  function showOverlay() {
    document.getElementById('overlay').style.display = 'flex';
    document.getElementById('mainArea').style.display = 'none';
  }

  function loadToken() {
    const t = document.getElementById('tokenInput').value.trim();
    if (!t) return;
    activateToken(t);
  }

  function activateToken(token) {
    currentToken = token;
    requests     = [];
    selectedIdx  = null;
    seenIds      = new Set();

    // Update URL without reload
    const url = new URL(location.href);
    url.searchParams.set('token', token);
    history.replaceState(null, '', url.toString());

    // Update header pill
    const baseURL = location.origin;
    const endpointURL = baseURL + '/r/' + token;
    document.getElementById('pillURL').textContent = endpointURL;
    document.getElementById('pillArea').style.display = 'flex';

    // Show main UI
    document.getElementById('overlay').style.display = 'none';
    document.getElementById('mainArea').style.display = 'flex';

    // Reset list
    renderList();
    showPlaceholder();

    // Load history then start SSE
    fetchHistory(token);
    connectSSE(token);
  }

  async function createNewEndpoint() {
    try {
      const res = await fetch('/api/endpoints', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name: '' }),
      });
      const json = await res.json();
      if (!json.success) throw new Error(json.error?.message || 'Failed');
      const token = json.body.token;
      document.getElementById('tokenInput').value = token;
      activateToken(token);
    } catch (err) {
      toast('Error: ' + err.message);
    }
  }

  // ── Fetch history ────────────────────────────────────────
  async function fetchHistory(token) {
    try {
      const res  = await fetch('/api/endpoints/' + token + '/requests');
      const json = await res.json();
      if (!json.success) return;
      const list = json.body || [];
      // oldest-first from API; we want newest on top in the UI
      list.reverse().forEach(r => {
        if (!seenIds.has(r.id)) {
          seenIds.add(r.id);
          requests.push(r);
        }
      });
      renderList();
    } catch (_) {}
  }

  // ── SSE ──────────────────────────────────────────────────
  function connectSSE(token) {
    if (evtSource) { evtSource.close(); evtSource = null; }

    const dot = document.getElementById('statusDot');
    dot.classList.remove('connected');

    evtSource = new EventSource('/api/endpoints/' + token + '/events');

    evtSource.onopen = () => dot.classList.add('connected');

    evtSource.onmessage = e => {
      try {
        const req = JSON.parse(e.data);
        if (!seenIds.has(req.id)) {
          seenIds.add(req.id);
          requests.unshift(req);   // newest first
          renderList(true);
        }
      } catch (_) {}
    };

    evtSource.onerror = () => {
      dot.classList.remove('connected');
      // Browser will auto-reconnect; we just update the indicator
    };
  }

  // ── Render request list ──────────────────────────────────
  function renderList(newItem) {
    const list    = document.getElementById('requestList');
    const empty   = document.getElementById('emptyState');
    const badge   = document.getElementById('countBadge');

    badge.textContent = requests.length;

    if (requests.length === 0) {
      list.innerHTML = '';
      if (empty) list.appendChild(empty);
      return;
    }

    if (empty) empty.remove();
    list.innerHTML = '';
    requests.forEach((req, i) => {
      const item = document.createElement('div');
      item.className = 'req-item' + (i === selectedIdx ? ' active' : '');
      item.innerHTML = `
        <span class="method-badge ${methodClass(req.method)}">${esc(req.method)}</span>
        <div class="req-meta">
          <div class="req-path" title="${esc(req.path)}">${esc(req.path)}</div>
          <div class="req-time">${relTime(req.receivedAt)}</div>
        </div>
        ${(newItem && i === 0) ? '<div class="new-dot"></div>' : ''}
      `;
      item.addEventListener('click', () => selectRequest(i));
      list.appendChild(item);
    });
    if (newItem) list.scrollTop = 0;
  }

  function selectRequest(idx) {
    selectedIdx = idx;
    renderList();
    showDetail(requests[idx]);
  }

  // ── Detail panel ─────────────────────────────────────────
  function showPlaceholder() {
    document.getElementById('detailPlaceholder').style.display = 'flex';
    document.getElementById('detailContent').style.display    = 'none';
  }

  function showDetail(req) {
    document.getElementById('detailPlaceholder').style.display = 'none';
    const dc = document.getElementById('detailContent');
    dc.style.display = 'flex';
    dc.style.flexDirection = 'column';
    dc.style.height = '100%';

    document.getElementById('dtMethod').textContent  = req.method;
    document.getElementById('dtMethod').className    = 'method-badge ' + methodClass(req.method);
    document.getElementById('dtPath').textContent    = req.path;
    document.getElementById('dtTs').textContent      = formatDate(req.receivedAt);

    renderTab(req, activeTab);

    // reset tab highlight
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(t => {
      if (t.textContent.trim().toLowerCase() === activeTab) t.classList.add('active');
    });
  }

  function switchTab(tab) {
    activeTab = tab;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    event.currentTarget.classList.add('active');
    if (selectedIdx !== null) renderTab(requests[selectedIdx], tab);
  }

  function renderTab(req, tab) {
    const content = document.getElementById('tabContent');
    switch (tab) {
      case 'headers': content.innerHTML = renderKV(parseHeaders(req.headers)); break;
      case 'body':    content.innerHTML = renderBody(req.body, req.contentType); break;
      case 'query':   content.innerHTML = renderKV(parseQuery(req.query));      break;
      case 'info':    content.innerHTML = renderInfo(req);                       break;
    }
  }

  // ── Tab renderers ────────────────────────────────────────
  function renderKV(pairs) {
    if (pairs.length === 0) {
      return '<p style="color:var(--muted);font-size:12px">No entries</p>';
    }
    const rows = pairs.map(([k, v]) =>
      `<tr><td>${esc(k)}</td><td>${esc(v)}</td></tr>`
    ).join('');
    return `<table class="kv-table">
      <thead><tr><th>Key</th><th>Value</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  }

  function renderBody(body, contentType) {
    if (!body || (typeof body === 'string' && body.trim() === '') || (body instanceof Array && body.length === 0)) {
      return '<pre class="body-pre body-empty">(empty body)</pre>';
    }

    let text;
    if (typeof body === 'string') {
      text = body;
    } else if (Array.isArray(body)) {
      // body comes as a JSON array of byte values (Go []byte -> base64 in JSON)
      // Actually the contract sends it as base64 string when marshalled
      text = body;
    } else {
      text = String(body);
    }

    // body arrives as base64 string (Go []byte JSON-encodes to base64)
    if (typeof text === 'string' && isBase64(text)) {
      try { text = atob(text); } catch (_) {}
    }

    // Try pretty-print JSON
    const ct = (contentType || '').toLowerCase();
    if (ct.includes('json') || looksLikeJSON(text)) {
      try {
        const parsed = JSON.parse(text);
        return `<pre class="body-pre">${syntaxHighlight(JSON.stringify(parsed, null, 2))}</pre>`;
      } catch (_) {}
    }

    return `<pre class="body-pre">${esc(text)}</pre>`;
  }

  function renderInfo(req) {
    const size = req.bodySize != null ? formatBytes(req.bodySize) : '0 B';
    return `<div class="info-grid">
      <div class="info-card"><div class="card-label">Remote IP</div><div class="card-value">${esc(req.remoteAddr || '—')}</div></div>
      <div class="info-card"><div class="card-label">Content-Type</div><div class="card-value">${esc(req.contentType || '—')}</div></div>
      <div class="info-card"><div class="card-label">Body Size</div><div class="card-value">${size}</div></div>
      <div class="info-card"><div class="card-label">Received At</div><div class="card-value">${formatDate(req.receivedAt)}</div></div>
      <div class="info-card"><div class="card-label">Hook ID</div><div class="card-value">${esc(String(req.hookId || '—'))}</div></div>
      <div class="info-card"><div class="card-label">Request ID</div><div class="card-value">${esc(String(req.id || '—'))}</div></div>
    </div>`;
  }

  // ── Parsers ──────────────────────────────────────────────
  function parseHeaders(raw) {
    if (!raw) return [];
    try {
      const obj = JSON.parse(raw);
      const pairs = [];
      for (const [k, v] of Object.entries(obj)) {
        if (Array.isArray(v)) v.forEach(val => pairs.push([k, val]));
        else pairs.push([k, String(v)]);
      }
      return pairs;
    } catch (_) { return []; }
  }

  function parseQuery(raw) {
    if (!raw) return [];
    try {
      const params = new URLSearchParams(raw);
      const pairs = [];
      for (const [k, v] of params.entries()) pairs.push([k, v]);
      return pairs;
    } catch (_) { return []; }
  }

  // ── Utilities ────────────────────────────────────────────
  function methodClass(m) {
    const map = { GET: 'method-GET', POST: 'method-POST', PUT: 'method-PUT', DELETE: 'method-DELETE', PATCH: 'method-PATCH' };
    return map[(m || '').toUpperCase()] || 'method-OTHER';
  }

  function relTime(iso) {
    if (!iso) return '';
    const diff = Date.now() - new Date(iso).getTime();
    const s    = Math.floor(diff / 1000);
    if (s < 5)   return 'just now';
    if (s < 60)  return s + 's ago';
    const m = Math.floor(s / 60);
    if (m < 60)  return m + 'm ago';
    const h = Math.floor(m / 60);
    if (h < 24)  return h + 'h ago';
    return Math.floor(h / 24) + 'd ago';
  }

  function formatDate(iso) {
    if (!iso) return '';
    return new Date(iso).toLocaleString();
  }

  function formatBytes(n) {
    if (n < 1024)        return n + ' B';
    if (n < 1024 * 1024) return (n / 1024).toFixed(1) + ' KB';
    return (n / 1024 / 1024).toFixed(2) + ' MB';
  }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function isBase64(s) {
    if (!s || typeof s !== 'string' || s.length % 4 !== 0) return false;
    return /^[A-Za-z0-9+/]*={0,2}$/.test(s);
  }

  function looksLikeJSON(s) {
    if (!s) return false;
    const t = s.trim();
    return (t.startsWith('{') && t.endsWith('}')) || (t.startsWith('[') && t.endsWith(']'));
  }

  function syntaxHighlight(json) {
    return json.replace(/("(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, match => {
      let cls = 'json-num';
      if (/^"/.test(match)) {
        cls = /:$/.test(match) ? 'json-key' : 'json-str';
      } else if (/true|false/.test(match)) {
        cls = 'json-bool';
      } else if (/null/.test(match)) {
        cls = 'json-null';
      }
      return `<span class="${cls}">${esc(match)}</span>`;
    });
  }

  function copyURL() {
    const url = document.getElementById('pillURL').textContent;
    navigator.clipboard.writeText(url).then(() => toast('URL copied!')).catch(() => toast('Copy failed'));
  }

  let toastTimer;
  function toast(msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => el.classList.remove('show'), 2500);
  }

  // Periodically refresh relative timestamps
  setInterval(() => {
    document.querySelectorAll('.req-time').forEach((el, i) => {
      if (requests[i]) el.textContent = relTime(requests[i].receivedAt);
    });
  }, 15000);
</script>
</body>
</html>
